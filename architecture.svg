<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Courier New',monospace">
  <rect width="800" height="520" fill="#0f172a"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="bold">JARVIS Voice Assistant — Architecture</text>

  <!-- Layer: Audio Input -->
  <rect x="50" y="60" width="160" height="80" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="90" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">🎤 Audio Input</text>
  <text x="130" y="108" text-anchor="middle" fill="#94a3b8" font-size="9">System Default Mic</text>
  <text x="130" y="122" text-anchor="middle" fill="#94a3b8" font-size="8">USB / Bluetooth</text>

  <!-- Layer: VAD -->
  <rect x="50" y="180" width="160" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="130" y="210" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">🔊 VAD</text>
  <text x="130" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">RMS Threshold 200</text>
  <text x="130" y="242" text-anchor="middle" fill="#94a3b8" font-size="8">Silence Detection</text>

  <!-- Arrow: Audio Input → VAD -->
  <line x1="130" y1="140" x2="130" y2="178" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer: Cloud ASR -->
  <rect x="290" y="60" width="200" height="120" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="390" y="85" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">☁️ Cloud ASR</text>
  <text x="390" y="103" text-anchor="middle" fill="#e2e8f0" font-size="9">火山引擎豆包流式识别</text>
  <text x="390" y="118" text-anchor="middle" fill="#94a3b8" font-size="8">WebSocket · ~300ms</text>
  <text x="390" y="135" text-anchor="middle" fill="#64748b" font-size="8">↕ fallback</text>
  <text x="390" y="150" text-anchor="middle" fill="#94a3b8" font-size="8">阿里云 Qwen Omni</text>
  <text x="390" y="165" text-anchor="middle" fill="#64748b" font-size="8">HTTP · ~1-3s</text>

  <!-- Arrow: VAD → Cloud ASR -->
  <line x1="210" y1="220" x2="288" y2="140" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer: Wake Detection -->
  <rect x="290" y="220" width="200" height="70" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="390" y="245" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">🔥 Wake Detection</text>
  <text x="390" y="263" text-anchor="middle" fill="#94a3b8" font-size="9">is_wake() + strip_wake()</text>
  <text x="390" y="278" text-anchor="middle" fill="#94a3b8" font-size="8">贾维斯 · jarvis · hi贾维斯</text>

  <!-- Arrow: Cloud ASR → Wake Detection -->
  <line x1="390" y1="180" x2="390" y2="218" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer: Hermes Brain -->
  <rect x="560" y="90" width="190" height="100" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="655" y="115" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="bold">🧠 Hermes Agent</text>
  <text x="655" y="133" text-anchor="middle" fill="#94a3b8" font-size="9">DeepSeek V4 Flash</text>
  <text x="655" y="150" text-anchor="middle" fill="#94a3b8" font-size="8">tmux persistent session</text>
  <text x="655" y="165" text-anchor="middle" fill="#64748b" font-size="8">Any command / skill</text>

  <!-- Arrow: Wake Detection → Hermes Brain -->
  <line x1="490" y1="245" x2="558" y2="145" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer: TTS -->
  <rect x="560" y="230" width="190" height="80" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="655" y="258" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold">🔊 TTS Output</text>
  <text x="655" y="276" text-anchor="middle" fill="#94a3b8" font-size="9">edge-tts Xiaoxiao</text>
  <text x="655" y="294" text-anchor="middle" fill="#94a3b8" font-size="8">afplay → System Speaker</text>

  <!-- Arrow: Hermes Brain → TTS -->
  <line x1="655" y1="190" x2="655" y2="228" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer: HUD -->
  <rect x="560" y="350" width="190" height="80" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="655" y="378" text-anchor="middle" fill="#fb7185" font-size="11" font-weight="bold">🖥 Desktop HUD</text>
  <text x="655" y="396" text-anchor="middle" fill="#94a3b8" font-size="9">HTML Canvas</text>
  <text x="655" y="414" text-anchor="middle" fill="#94a3b8" font-size="8">localhost:18326</text>

  <!-- Arrow: VAD → HUD (state updates) -->
  <line x1="130" y1="260" x2="130" y2="380" stroke="#34d399" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="130" y1="380" x2="558" y2="390" stroke="#34d399" stroke-width="0.8" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Color Legend -->
  <text x="400" y="470" text-anchor="middle" fill="#64748b" font-size="9">
    Blue=Idle · Yellow=Listening · Red=Thinking · Green=Speaking
  </text>
  <text x="400" y="488" text-anchor="middle" fill="#64748b" font-size="9">
    GitHub: https://github.com/qhdhao13/jarvis-voice-assistant
  </text>
</svg>
