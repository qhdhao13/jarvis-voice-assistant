<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>J.A.R.V.I.S HUD</title>
<style>
*{margin:0;padding:0;overflow:hidden}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;position:relative}
canvas{display:block;width:400px;height:400px;border-radius:50%;box-shadow:0 0 60px rgba(60,160,255,0.08)}
#legend{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;
  font-family:"Courier New",monospace;font-size:10px;letter-spacing:1px;
  opacity:0;transition:opacity 0.6s,transform 0.6s;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:3px}
#legend.show{opacity:1;transform:translateX(-50%) translateY(0)}
#legend .tag{display:inline-block;padding:3px 12px;border:1px solid;border-radius:2px;
  background:rgba(0,0,0,0.7);font-size:9px;letter-spacing:1px}
#legend .desc{font-size:8px;letter-spacing:0.5px;opacity:0.7}
#legend .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle}
</style>
</head><body>
<canvas id="c" width="600" height="600"></canvas>
<div id="legend"><div class="tag" id="legendTag"></div><div class="desc" id="legendDesc"></div></div>
<script>
var MODE_INFO={
  idle:{label:'STANDBY',color:[60,200,255],desc:'待命 · 等待唤醒'},
  listening:{label:'LISTEN',color:[255,220,50],desc:'聆听 · 正在接收语音'},
  thinking:{label:'PROCESS',color:[255,80,140],desc:'思考 · 处理指令中'},
  speaking:{label:'SPEAK',color:[40,220,130],desc:'播报 · 语音回复中'}
};

var Perlin=function(){
  this.p=new Uint8Array(512);
  for(var i=0;i<256;i++)this.p[i]=i;
  for(var i=255;i>0;i--){var j=Math.random()*(i+1)|0;var t=this.p[i];this.p[i]=this.p[j];this.p[j]=t}
  for(var i=0;i<256;i++)this.p[256+i]=this.p[i];
};
Perlin.prototype.fade=function(t){return t*t*t*(t*(t*6-15)+10)};
Perlin.prototype.lerp=function(a,b,t){return a+t*(b-a)};
Perlin.prototype.grad=function(h,x,y,z){
  var u=h&15;var v=u<8?x:y;var w=u<4?y:u===12||u===14?x:z;
  return((u&1)===0?v:-v)+((u&2)===0?w:-w);
};
Perlin.prototype.noise=function(x,y,z){
  var X=Math.floor(x)&255,Y=Math.floor(y)&255,Z=Math.floor(z)&255;
  x-=Math.floor(x);y-=Math.floor(y);z-=Math.floor(z);
  var u=this.fade(x),v=this.fade(y),w=this.fade(z);
  var A=this.p[X]+Y,AA=this.p[A]+Z,AB=this.p[A+1]+Z;
  var B=this.p[X+1]+Y,BA=this.p[B]+Z,BB=this.p[B+1]+Z;
  return this.lerp(this.lerp(this.lerp(this.grad(this.p[AA],x,y,z),this.grad(this.p[BA],x-1,y,z),u),this.lerp(this.grad(this.p[AB],x,y-1,z),this.grad(this.p[BB],x-1,y-1,z),u),v),this.lerp(this.lerp(this.grad(this.p[AA+1],x,y,z-1),this.grad(this.p[BA+1],x-1,y,z-1),u),this.lerp(this.grad(this.p[AB+1],x,y-1,z-1),this.grad(this.p[BB+1],x-1,y-1,z-1),u),v),w);
};

var pn=new Perlin();
var C=document.getElementById('c');
var ctx=C.getContext('2d');
var W=600,H=600,cx=300,cy=300,MAX_R=260,R_BASE=250;
var mode='idle',t=0,flash=0;

var PALS={
  idle:[[60,200,255],[30,120,220]],
  listening:[[255,220,50],[200,180,30]],
  thinking:[[255,80,140],[200,40,100]],
  speaking:[[40,220,130],[20,160,90]]
};

function rgba(c,a){return'rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+','+a+')'}

function updateLegend(m){
  var info=MODE_INFO[m]||MODE_INFO.idle;
  var el=document.getElementById('legend');
  var tag=document.getElementById('legendTag');
  var desc=document.getElementById('legendDesc');
  var c=info.color;
  tag.innerHTML='<span class="dot" style="background:rgb('+c[0]+','+c[1]+','+c[2]+')"></span>'+info.label;
  tag.style.color='rgb('+c[0]+','+c[1]+','+c[2]+')';
  tag.style.borderColor='rgba('+c[0]+','+c[1]+','+c[2]+',0.4)';
  desc.textContent=info.desc;
  desc.style.color='rgba('+c[0]+','+c[1]+','+c[2]+',0.6)';
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

async function poll(){
  try{
    var r=await fetch('/state');
    var j=await r.json();
    if(j.mode!==mode){mode=j.mode;flash=1;updateLegend(mode);}
  }catch(e){}
  setTimeout(poll,200);
}

var PARTICLES=[];
for(var i=0;i<60;i++)PARTICLES.push({a:Math.random()*Math.PI*2,r:40+Math.random()*(MAX_R-50),v:(Math.random()-0.5)*0.003,sz:1+Math.random()*2.5,ph:Math.random()*Math.PI*2});
var ORBITS=[];
for(var i=0;i<24;i++)ORBITS.push({a:i/24*Math.PI*2,spd:0.2+Math.random()*0.3,phase:Math.random()*Math.PI*2});

function draw(){
  t+=0.02;if(flash>0)flash*=0.92;if(flash<0.01)flash=0;
  ctx.clearRect(0,0,W,H);
  var pal=PALS[mode]||PALS.idle;
  var c1=pal[0],c2=pal[1];
  // Grid
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,MAX_R+20,0,Math.PI*2);ctx.clip();
  for(var x=0;x<W;x+=35){for(var y=0;y<H;y+=35){
    var dx=x-cx,dy=y-cy;
    if(dx*dx+dy*dy<(MAX_R+10)*(MAX_R+10)){
      var ns=pn.noise(x*0.008,y*0.008,t*0.3)*3;
      var ex=x+ns,ey=y+ns;
      ctx.fillStyle=rgba(c1,0.06+0.04*Math.sin(t+dx*0.03+dy*0.03));
      ctx.beginPath();ctx.arc(ex,ey,1.2,0,Math.PI*2);ctx.fill();
    }}}
  ctx.restore();
  // Rings
  for(var ring=0;ring<5;ring++){
    var r=R_BASE-ring*30+Math.sin(t*0.5+ring)*8;ctx.beginPath();
    for(var i=0;i<=80;i++){
      var a=i/80*Math.PI*2;
      var ns=pn.noise(Math.cos(a)*0.5+1,Math.sin(a)*0.5+1,t*0.4+ring*0.3)*12;
      var rr=r+ns-4;var x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.strokeStyle=rgba(c1,Math.max(0,0.35-ring*0.06)+flash*0.3);
    ctx.lineWidth=Math.max(0.5,3-ring*0.5);ctx.stroke();
  }
  // Particles
  for(var i=0;i<PARTICLES.length;i++){
    var p=PARTICLES[i];p.a+=p.v;
    var ns=pn.noise(Math.cos(p.a)*3,Math.sin(p.a)*3,t*0.5+p.ph)*8;var rr=p.r+ns;
    var x=cx+Math.cos(p.a)*rr,y=cy+Math.sin(p.a)*rr;
    var a=0.3+0.7*(0.5+0.5*Math.sin(t+p.ph));var sz=p.sz*(0.7+0.3*Math.sin(t*1.3+p.ph));
    ctx.beginPath();ctx.arc(x,y,sz,0,Math.PI*2);ctx.fillStyle=rgba(c1,a*0.6);ctx.fill();
    ctx.beginPath();ctx.arc(x,y,sz*3,0,Math.PI*2);ctx.fillStyle=rgba(c1,a*0.1);ctx.fill();
  }
  // Orbit dots
  for(var i=0;i<ORBITS.length;i++){
    var o=ORBITS[i];var a=o.a+t*o.spd;
    var ns=pn.noise(Math.cos(a),Math.sin(a),t)*6;var r=MAX_R-20+ns;
    var x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
    var bright=0.5+0.5*Math.sin(t*2+o.phase);
    ctx.fillStyle=rgba(c2,bright*0.8);ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+Math.cos(a-0.08)*r,cy+Math.sin(a-0.08)*r);
    ctx.lineTo(x,y);ctx.strokeStyle=rgba(c2,bright*0.15);ctx.lineWidth=1.5;ctx.stroke();
  }
  // Center glow ball
  var glowR=8+4*Math.sin(t*1.5)+flash*15;
  for(var g=6;g>0;g--){var r=glowR*(g/6);var a=Math.max(0,0.5-g*0.08)+flash*0.2;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=rgba(c1,a);ctx.fill();}
  ctx.beginPath();ctx.arc(cx,cy,2.5,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,'+(0.6+0.4*Math.sin(t*2))+')';ctx.fill();
  // Text
  ctx.fillStyle=rgba(c2,0.7+flash*0.3);
  ctx.font='bold 11px "Courier New",monospace';ctx.textAlign='center';
  ctx.fillText('J.A.R.V.I.S',cx,cy-38);
  var labels={idle:'STANDBY',listening:'LISTEN',thinking:'PROCESS',speaking:'SPEAK'};
  ctx.font='9px "Courier New",monospace';
  ctx.fillText((labels[mode]||'STANDBY'),cx,cy+44);
  requestAnimationFrame(draw);
}
updateLegend('idle');poll();draw();
</script></body></html>
